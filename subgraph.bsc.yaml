specVersion: 1.0.0
description: OneMEME Launchpad subgraph — tracks token launches, bonding-curve trades, migrations, and creator vesting on BNB Smart Chain
repository: https://github.com/timedbase/OneMEMELaunchpad-Subgraph
features:
  - ipfsOnEthereumContracts

indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: LaunchpadFactory
    network: bsc
    source:
      address: "0xA78df27496825B29CbdCD3778e6bc375a646Ae04"
      abi: LaunchpadFactory
      startBlock: 91706714
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Factory
        - Token
        - TimelockAction
      abis:
        - name: LaunchpadFactory
          file: ./abis/LaunchpadFactory.json
        - name: Token
          file: ./abis/Token.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,uint256,uint256,uint256,bool,uint256)
          handler: handleTokenCreated
        - event: DefaultParamsUpdated(uint256,uint256,uint256,uint256)
          handler: handleDefaultParamsUpdated
        - event: CreationFeeUpdated(uint256,uint256)
          handler: handleCreationFeeUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: ManagerAdded(indexed address)
          handler: handleManagerAdded
        - event: ManagerRemoved(indexed address)
          handler: handleManagerRemoved
        - event: TimelockQueued(indexed bytes32,uint256)
          handler: handleTimelockQueued
        - event: TimelockExecuted(indexed bytes32)
          handler: handleTimelockExecuted
        - event: TimelockCancelled(indexed bytes32)
          handler: handleTimelockCancelled
      file: ./src/launchpadFactory.ts

  - kind: ethereum
    name: BondingCurve
    network: bsc
    source:
      address: "0xbB843b111639B9F19E575e3804b7c006eE1F80a9"
      abi: BondingCurve
      startBlock: 91706714
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Trade
        - Migration
        - Factory
        - TokenSnapshot
        - TokenPeriodStats
      abis:
        - name: BondingCurve
          file: ./abis/BondingCurve.json
      eventHandlers:
        - event: TokenBought(indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleTokenBought
        - event: TokenSold(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleTokenSold
        - event: TokenMigrated(indexed address,indexed address,uint256,uint256)
          handler: handleTokenMigrated
        - event: FeesUpdated(uint256,uint256)
          handler: handleFeesUpdated
        - event: FeeRecipientUpdated(address)
          handler: handleFeeRecipientUpdated
        - event: CharityWalletUpdated(address)
          handler: handleCharityWalletUpdated
        - event: RouterUpdated(indexed address,indexed address)
          handler: handleRouterUpdated
      file: ./src/bondingCurve.ts

  - kind: ethereum
    name: VestingWallet
    network: bsc
    source:
      address: "0x1fFBE03316743187fCEC8eA41fd76f8Ada74658C"
      abi: VestingWallet
      startBlock: 91706714
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VestingSchedule
        - VestingClaim
      abis:
        - name: VestingWallet
          file: ./abis/VestingWallet.json
      eventHandlers:
        - event: VestingAdded(indexed address,indexed address,uint256)
          handler: handleVestingAdded
        - event: Claimed(indexed address,indexed address,uint256)
          handler: handleClaimed
        - event: VestingVoided(indexed address,indexed address,uint256)
          handler: handleVestingVoided
      file: ./src/vestingWallet.ts

  - kind: ethereum
    name: OneCoinLocker
    network: bsc
    source:
      address: "0x6C6e9740753d9F6C1E5D61C8bc0f34E37590f6C5"
      abi: OneCoinLocker
      startBlock: 91706714
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Locker
        - Lock
        - LockWithdrawal
        - LockTransfer
      abis:
        - name: OneCoinLocker
          file: ./abis/OneCoinLocker.json
      eventHandlers:
        - event: LockCreated(indexed uint256,indexed address,indexed address,uint256,uint256,uint256,uint8,bool)
          handler: handleLockCreated
        - event: LockEdited(indexed uint256,uint256,uint256)
          handler: handleLockEdited
        - event: LockDescriptionChanged(indexed uint256,string)
          handler: handleLockDescriptionChanged
        - event: Withdrawn(indexed uint256,indexed address,uint256,uint256)
          handler: handleWithdrawn
        - event: LockExtended(indexed uint256,uint256)
          handler: handleLockExtended
        - event: LockTransferred(indexed uint256,indexed address,indexed address)
          handler: handleLockTransferred
        - event: LockRenounced(indexed uint256)
          handler: handleLockRenounced
        - event: FeeUpdated(uint256)
          handler: handleFeeUpdated
      file: ./src/locker.ts

templates:
  - kind: ethereum
    name: MemeToken
    network: bsc
    source:
      abi: MemeToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Holder
        - Token
      abis:
        - name: MemeToken
          file: ./abis/MemeToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./src/memeToken.ts
